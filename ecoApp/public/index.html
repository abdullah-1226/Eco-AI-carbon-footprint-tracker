<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>%WEB_TITLE%</title>
    <style id="expo-reset">
      /* Make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* Disable body scrolling — use ScrollView inside the app */
      body {
        overflow: hidden;
        margin: 0;
        padding: 0;
        -webkit-overflow-scrolling: touch;
      }
      /* Root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
      /* Respect safe area insets (iPhone notch / home indicator) */
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
